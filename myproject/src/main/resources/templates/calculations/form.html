<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Calculadora de Probabilidade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1>Calculadora de Probabilidade de Dados</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/calculations}" method="post" th:object="${calculation}">
        <input type="hidden" th:field="*{id}">

        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label">Nº de Dados:</label>
                <input type="number" th:field="*{numDice}" class="form-control" min="1" max="10" required>
            </div>

            <div class="col-md-3">
                <label class="form-label">Nº de Lados:</label>
                <input type="number" th:field="*{numSides}" class="form-control" min="1" max="10" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Tipo de Cálculo:</label>
                <select id="calculationType" th:field="*{calculationType}" class="form-select" required onchange="toggleFields()">
                    <option value="">Selecione o tipo...</option>
                    <option value="width">Largura Mínima</option>
                    <option value="height">Altura Mínima</option>
                    <option value="both">Largura e Altura</option>
                </select>
            </div>
        </div>

        <div id="widthField" class="row mb-3" style="display: none;">
            <div class="col-md-3">
                <label class="form-label">Largura Mínima:</label>
                <input type="number" th:field="*{minWidth}" class="form-control" min="2" max="10" required>
                <small class="form-text text-muted">Mínimo de dados iguais necessários</small>
            </div>
        </div>

        <div id="heightField" class="row mb-3" style="display: none;">
            <div class="col-md-3">
                <label class="form-label">Altura Mínima:</label>
                <input type="number" th:field="*{minHeight}" class="form-control" min="1" max="10" required>
                <small class="form-text text-muted">Valor mínimo do dado no match</small>
            </div>
        </div>

        <div class="mb-3">
            <button type="submit" class="btn btn-primary">
                <span th:if="${calculation.id == null}">Calcular e Salvar</span>
                <span th:if="${calculation.id != null}">Atualizar Cálculo</span>
            </button>
            <a th:href="@{/calculations}" class="btn btn-secondary">Voltar</a>
        </div>
    </form>
</div>

<script>
    function toggleFields() {
        const type = document.getElementById('calculationType').value;

        // Esconde todos os campos primeiro
        document.getElementById('widthField').style.display = 'none';
        document.getElementById('heightField').style.display = 'none';

        // Remove required de todos os campos
        document.querySelectorAll('#widthField input, #heightField input').forEach(input => {
            input.removeAttribute('required');
        });

        // Mostra apenas os campos relevantes e adiciona required
        if (type === 'width') {
            document.getElementById('widthField').style.display = 'block';
            document.querySelector('#widthField input').setAttribute('required', 'required');
        } else if (type === 'height') {
            document.getElementById('heightField').style.display = 'block';
            document.querySelector('#heightField input').setAttribute('required', 'required');
        } else if (type === 'both') {
            document.getElementById('widthField').style.display = 'block';
            document.getElementById('heightField').style.display = 'block';
            document.querySelector('#widthField input').setAttribute('required', 'required');
            document.querySelector('#heightField input').setAttribute('required', 'required');
        }
    }

    // Executa na carga da página para configurar campos iniciais
    document.addEventListener('DOMContentLoaded', function() {
        toggleFields();
    });
</script>
</body>
</html>
