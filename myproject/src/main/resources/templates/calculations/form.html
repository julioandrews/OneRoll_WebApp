<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Calculadora de Probabilidade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Calculadora de Probabilidade de Dados</h1>

    <!-- Alertas -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>


    <form th:action="@{/calculations}" method="post" th:object="${calculation}">

        <input type="hidden" th:field="*{id}">

        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label">Nº de Dados:</label>
                <input type="number" th:field="*{numDice}" class="form-control" min="1" max="10" required>
            </div>

            <div class="col-md-3">
                <label class="form-label">Nº de Lados:</label>
                <input type="number" th:field="*{numSides}" class="form-control" min="1" max="10" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Tipo de Cálculo:</label>
                <select th:field="*{calculationType}" class="form-select" required>
                    <option value="">Selecione o tipo...</option>
                    <option value="width">Largura Mínima</option>
                    <option value="height">Altura Mínima</option>
                    <option value="both">Largura e Altura</option>
                    <option value="specific">Match Específico</option>
                </select>
            </div>
        </div>

        <!-- Campos para Largura -->
        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label">Largura Mínima (w):</label>
                <input type="number" th:field="*{minWidth}" class="form-control" min="2" max="10" placeholder="Opcional">
            </div>
        </div>

        <!-- Campos para Altura -->
        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label">Altura Mínima (h):</label>
                <input type="number" th:field="*{minHeight}" class="form-control" min="1" max="10" placeholder="Opcional">
            </div>
        </div>

        <!-- Campos para Match Específico -->
        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label">Quantidade de Matches:</label>
                <input type="number" th:field="*{specificAmount}" class="form-control" min="1" max="10" placeholder="Opcional">
            </div>
            <div class="col-md-3">
                <label class="form-label">Largura do Match:</label>
                <input type="number" th:field="*{specificWidth}" class="form-control" min="2" max="10" placeholder="Opcional">
            </div>
        </div>

        <div class="mb-3">
            <button type="submit" class="btn btn-primary">Calcular e Salvar</button>
            <a th:href="@{/calculations}" class="btn btn-secondary">Voltar</a>
        </div>
    </form>
</div>
</body>
</html>
