<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Histórico de Cálculos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Histórico de Cálculos</h1>

    <!-- Alertas -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Formulário de Pesquisa por ID -->
    <form th:action="@{/calculations/pesquisar}" method="get" class="mb-4">
        <div class="row">
            <div class="col-md-4">
                <label class="form-label">Pesquisar por ID:</label>
                <input type="number" name="id" class="form-control" placeholder="Digite o ID" min="1">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-info">Pesquisar</button>
            </div>
        </div>
    </form>

    <!-- Botões de Busca Avançada -->
    <div class="mb-3">
        <a th:href="@{/calculations/ordenar/probabilidade}" class="btn btn-outline-primary btn-sm">Ordenar por Probabilidade</a>
        <a th:href="@{/calculations/buscar/tipo?tipo=width}" class="btn btn-outline-secondary btn-sm">Só Largura</a>
        <a th:href="@{/calculations/buscar/tipo?tipo=height}" class="btn btn-outline-secondary btn-sm">Só Altura</a>
        <a th:href="@{/calculations/buscar/tipo?tipo=both}" class="btn btn-outline-secondary btn-sm">Largura e Altura</a>
    </div>

    <div th:if="${calculations.empty}" class="alert alert-info">
        Nenhum cálculo encontrado!
    </div>

    <table th:unless="${calculations.empty}" class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Dados</th>
            <th>Lados</th>
            <th>Tipo</th>
            <th>Largura</th>
            <th>Altura</th>
            <th>Probabilidade</th>
            <th>Data</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="calc : ${calculations}">
            <td th:text="${calc.id}"></td>
            <td th:text="${calc.numDice}"></td>
            <td th:text="${calc.numSides}"></td>
            <td>
                <span th:if="${calc.calculationType == 'width'}" class="badge bg-primary">Largura</span>
                <span th:if="${calc.calculationType == 'height'}" class="badge bg-success">Altura</span>
                <span th:if="${calc.calculationType == 'both'}" class="badge bg-warning">Ambos</span>
            </td>
            <td th:text="${calc.minWidth} ?: '-'"></td>
            <td th:text="${calc.minHeight} ?: '-'"></td>
            <td th:text="${#numbers.formatPercent(calc.probability, 1, 2)}"></td>
            <td th:text="${#temporals.format(calc.createdAt, 'dd/MM/yy HH:mm')}"></td>
            <td>
                <a th:href="@{/calculations/editar/{id}(id=${calc.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/calculations/remover/{id}(id=${calc.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Tem certeza que deseja excluir este cálculo?')">Excluir</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a th:href="@{/calculations/novo}" class="btn btn-primary">Novo Cálculo</a>
        <a th:href="@{/}" class="btn btn-secondary">Página Inicial</a>
    </div>
</div>
</body>
</html>
